<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luxury Jewelry</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">💎 Luxe Jewelry</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
      </ul>

      <input type="text" id="searchInput" class="form-control ms-3 search-box" placeholder="Search jewelry...">
    </div>
  </div>
</nav>

<!-- Hero Section -->
<section class="hero d-flex align-items-center justify-content-center text-center text-white">
  <div>
    <h1 class="display-3 fw-bold fade-up">Elegant Jewelry Collection</h1>
    <p class="lead fade-up delay">Luxury crafted for every moment ✨</p>
    <a href="shop.html" class="btn btn-warning btn-lg mt-3 fade-up delay2">Shop Now</a>
  </div>
</section>

<!-- Categories -->
<section class="container py-5">
  <h2 class="text-center mb-5 section-title">Our Collection</h2>

  <div class="row g-4" id="cardsContainer">

    <div class="col-md-4">
      <div class="card jewelry-card" onclick="openCategory('Necklace')">
        <img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638?q=80&w=1200&auto=format&fit=crop" class="card-img-top">
        <div class="card-body text-center">
          <h3>Necklace</h3>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card jewelry-card" onclick="openCategory('Bracelet')">
        <img src="https://images.unsplash.com/photo-1611652022419-a9419f74343d?q=80&w=1200&auto=format&fit=crop" class="card-img-top">
        <div class="card-body text-center">
          <h3>Bracelet</h3>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card jewelry-card" onclick="openCategory('Earring')">
        <!-- <img src="https://images.unsplash.com/photo-1635767798638-3665c7a0c0c5?q=80&w=1200&auto=format&fit=crop" class="card-img-top"> -->
         <img src="images/bracelet5.webp" class="card-img-top">
        <div class="card-body text-center">
          <h3>Earring</h3>
        </div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card jewelry-card" onclick="openCategory('Ring')">
        <img src="https://images.unsplash.com/photo-1605100804763-247f67b3557e?q=80&w=1200&auto=format&fit=crop" class="card-img-top">
        <div class="card-body text-center">
          <h3>Ring</h3>
        </div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card jewelry-card" onclick="openCategory('Catcher')">
        <img src="https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?q=80&w=1200&auto=format&fit=crop" class="card-img-top">
        <div class="card-body text-center">
          <h3>Catcher</h3>
        </div>
      </div>
    </div>

  </div>
</section>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-4">
  <p>© 2026 Luxe Jewelry | All Rights Reserved</p>
</footer>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
